<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab|Roboto:300" rel="stylesheet">
    
    <!-- Navigation Component -->
    <script src="js/navigation.js"></script>

    <!-- Zip Code Comparison Component -->
    <script src="js/zip-code-comparison.js"></script>

    <title>Compare Neighborhoods and Zip Codes - Tree Complaints</title>
  </head>
  <body>
    <!-- Zip Code Comparison Tool -->
    <div id="zip-comparison-root"></div>

    <!-- Back to Home Button -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const backBtn = new NavigationButton({
          label: 'Back to Home',
          targetPage: 'index.html',
          containerSelector: 'body',
          className: 'back-btn'
        });
        backBtn.render();

        // Initialize the zip code comparison tool
        const comparison = new ZipCodeComparison({
          complaintsFile: 'data/complaints_all_zip_codes copy.csv',
          neighborhoodsFile: 'data/neighborhoods.csv',
          containerSelector: '#zip-comparison-root'
        });
      });
    </script>
  </body>
</html>
